name: Update Plugin Metadata

on:
  repository_dispatch:
    types: [new-plugin-release]

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Marketplace
        uses: actions/checkout@v4

      - name: Generate Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: citadel-app
          repositories: citadel-marketplace

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cleanup Existing PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PLUGIN_ID="${{ github.event.client_payload.plugin_id }}"
          VERSION="${{ github.event.client_payload.version }}"
          BRANCH="update-${PLUGIN_ID}-${VERSION}"

          echo "Checking for existing PR on branch $BRANCH..."
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            echo "Closing existing PR #$PR_NUMBER..."
            gh pr close "$PR_NUMBER" --delete-branch || true
          elif git ls-remote --exit-code --heads origin "$BRANCH"; then
            echo "Branch exists but no open PR. Deleting branch..."
            git push origin --delete "$BRANCH" || true
          fi

      - name: Initialize Plugin Meta
        run: |
          PLUGIN_ID="${{ github.event.client_payload.plugin_id }}"
          VERSION="${{ github.event.client_payload.version }}"
          if [ ! -d "directory/$PLUGIN_ID" ]; then
            echo "New plugin detected. Initializing from template..."
            mkdir -p "directory/$PLUGIN_ID"
            cp -r .template/* "directory/$PLUGIN_ID/"
            # Remove template's version history so it starts fresh
            rm "directory/$PLUGIN_ID/versions.json"
          fi

      - name: Update package.json
        run: |
          PLUGIN_ID="${{ github.event.client_payload.plugin_id }}"
          VERSION="${{ github.event.client_payload.version }}"
          BUNDLE_URL="${{ github.event.client_payload.bundle_url }}"
          TITLE="${{ github.event.client_payload.title }}"
          DESC="${{ github.event.client_payload.description }}"
          AUTHOR="${{ github.event.client_payload.author }}"
          REPO_URL="${{ github.event.client_payload.repo_url }}"
          NAME="${{ github.event.client_payload.plugin_id }}"
          CITADEL_VERSION_RANGE="${{ github.event.client_payload.citadel_version_range || '>=1.1.0' }}"
          PERMISSIONS='${{ toJson(github.event.client_payload.features.permissions) }}'
          CAPABILITIES='${{ toJson(github.event.client_payload.features.capabilities) }}'
          SIDECARS='${{ toJson(github.event.client_payload.features.sidecars) }}'

          PKG_PATH="directory/$PLUGIN_ID/package.json"

          # Use jq to update all fields
          jq --arg ver "$VERSION" --arg url "$BUNDLE_URL" \
             --arg title "$TITLE" --arg desc "$DESC" \
             --arg author "$AUTHOR" --arg repo "$REPO_URL" \
             --arg name "$NAME" --arg cvr "$CITADEL_VERSION_RANGE" \
             --argjson perms "${PERMISSIONS:-[]}" --argjson caps "${CAPABILITIES:-[]}" --argjson sc "${SIDECARS:-[]}" \
             '.name = $name | .version = $ver | .citadel.bundleUrl = $url | .citadel.title = $title | .description = $desc | .author = $author | .repository.url = $repo | .engines.citadel = $cvr | .citadel.permissions = $perms | .citadel.capabilities = $caps | .citadel.sidecars = $sc' \
             "$PKG_PATH" > temp.json && mv temp.json "$PKG_PATH"

      - name: Update README.md
        run: |
          PLUGIN_ID="${{ github.event.client_payload.plugin_id }}"
          TITLE="${{ github.event.client_payload.title }}"
          DESC="${{ github.event.client_payload.description }}"

          README_PATH="directory/$PLUGIN_ID/README.md"

          # Replace title and description placeholders
          sed -i "1s/.*/# $TITLE/" "$README_PATH"
          sed -i "3s/.*/$DESC/" "$README_PATH"

      - name: Update versions.json
        run: |
          PLUGIN_ID="${{ github.event.client_payload.plugin_id }}"
          VERSION="${{ github.event.client_payload.version }}"
          CHANGELOG="Automated release from CI"

          PKG_PATH="directory/$PLUGIN_ID/package.json"
          VERSIONS_PATH="directory/$PLUGIN_ID/versions.json"

          # Initialize versions.json if it doesn't exist
          if [ ! -f "$VERSIONS_PATH" ]; then
            echo '{"latest": "", "versions": {}}' > "$VERSIONS_PATH"
          fi

          # Extract the citadel block from the already-updated package.json
          # This ensures we get permissions, capabilities, bundleUrl, etc.
          CITADEL_BLOCK=$(jq -c '.citadel // {}' "$PKG_PATH")
          DESC=$(jq -r '.description // ""' "$PKG_PATH")
          CVR=$(jq -r '.engines.citadel // ">=1.1.0"' "$PKG_PATH")

          # Add new version entry and update latest
          RELEASED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq --arg ver "$VERSION" --argjson citadel "$CITADEL_BLOCK" --arg ch "$CHANGELOG" --arg dt "$RELEASED_AT" --arg desc "$DESC" --arg cvr "$CVR" \
             '.versions[$ver] = ($citadel + { releasedAt: $dt, changelog: $ch, description: $desc, citadelVersionRange: $cvr }) | .latest = $ver' \
             "$VERSIONS_PATH" > temp.json && mv temp.json "$VERSIONS_PATH"

      - name: Update Root README.md
        run: |
          node -e '
          const fs = require("fs");
          const path = require("path");

          function findPackages(dir, results = []) {
            const list = fs.readdirSync(dir);
            list.forEach(file => {
              const fullPath = path.join(dir, file);
              const stat = fs.statSync(fullPath);
              if (stat.isDirectory()) {
                if (file.startsWith(".")) return;
                findPackages(fullPath, results);
              } else if (file === "package.json") {
                results.push(fullPath);
              }
            });
            return results;
          }

          const pkgFiles = findPackages("directory");
          const plugins = pkgFiles.map(file => {
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            const relDir = path.dirname(file).replace(/\\/g, "/");
            return {
              title: pkg.citadel?.title || pkg.name,
              id: pkg.name,
              author: pkg.citadel?.author || (typeof pkg.author === "object" ? pkg.author.name : pkg.author) || "",
              description: pkg.description || "",
              version: pkg.version,
              path: relDir
            };
          });

          // Sort alphabetically by title
          plugins.sort((a, b) => a.title.localeCompare(b.title));

          const tableHeader = "| Plugin Name | ID | Author | Description | Version |\n| :--- | :--- | :--- | :--- | :--- |";
          const tableRows = plugins.map(p => 
            `| **[${p.title}](./${p.path})** | \`${p.id}\` | ${p.author} | ${p.description} | \`${p.version}\` |`
          ).join("\n");

          const table = `${tableHeader}\n${tableRows}`;
          const readmePath = "README.md";
          let readme = fs.readFileSync(readmePath, "utf8");
          
          const startMarker = "<!-- PLUGINS_START -->";
          const endMarker = "<!-- PLUGINS_END -->";
          const regex = new RegExp(`${startMarker}[\\s\\S]*${endMarker}`);
          
          const newReadme = readme.replace(regex, `${startMarker}\n${table}\n${endMarker}`);
          fs.writeFileSync(readmePath, newReadme);
          '

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "Release: ${{ github.event.client_payload.plugin_id }}@${{ github.event.client_payload.version }}"
          branch: "update-${{ github.event.client_payload.plugin_id }}-${{ github.event.client_payload.version }}"
          title: "🚀 [Release] ${{ github.event.client_payload.plugin_id }} v${{ github.event.client_payload.version }}"
          body: |
            This is an automated PR from the plugin CI.

            - **Plugin**: `${{ github.event.client_payload.plugin_id }}`
            - **New Version**: `${{ github.event.client_payload.version }}`
            - **Bundle URL**: ${{ github.event.client_payload.bundle_url }}

            Please review the metadata changes and metadata syntax before merging.
          delete-branch: true
