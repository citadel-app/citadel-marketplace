name: Update Plugin Metadata

on:
  repository_dispatch:
    types: [new-plugin-release]

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Marketplace
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cleanup Existing PR
        env:
          GH_TOKEN: ${{ secrets.CITADEL_RELEASE_TOKEN }}
        run: |
          PLUGIN_ID="${{ github.event.client_payload.plugin_id }}"
          VERSION="${{ github.event.client_payload.version }}"
          BRANCH="update-${PLUGIN_ID}-${VERSION}"

          echo "Checking for existing PR on branch $BRANCH..."
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            echo "Closing existing PR #$PR_NUMBER..."
            gh pr close "$PR_NUMBER" --delete-branch || true
          elif git ls-remote --exit-code --heads origin "$BRANCH"; then
            echo "Branch exists but no open PR. Deleting branch..."
            git push origin --delete "$BRANCH" || true
          fi

      - name: Initialize Plugin Meta
        run: |
          PLUGIN_ID="${{ github.event.client_payload.plugin_id }}"
          VERSION="${{ github.event.client_payload.version }}"
          if [ ! -d "directory/$PLUGIN_ID" ]; then
            echo "New plugin detected. Initializing from template..."
            mkdir -p "directory/$PLUGIN_ID"
            cp -r .template/* "directory/$PLUGIN_ID/"
            # Remove template's version history so it starts fresh
            rm "directory/$PLUGIN_ID/versions.json"
          fi

      - name: Update package.json
        run: |
          PLUGIN_ID="${{ github.event.client_payload.plugin_id }}"
          VERSION="${{ github.event.client_payload.version }}"
          BUNDLE_URL="${{ github.event.client_payload.bundle_url }}"
          TITLE="${{ github.event.client_payload.title }}"
          DESC="${{ github.event.client_payload.description }}"
          AUTHOR="${{ github.event.client_payload.author }}"
          REPO_URL="${{ github.event.client_payload.repo_url }}"
          NAME="${{ github.event.client_payload.name }}"

          PKG_PATH="directory/$PLUGIN_ID/package.json"

          # Use jq to update all fields
          jq --arg ver "$VERSION" --arg url "$BUNDLE_URL" \
             --arg title "$TITLE" --arg desc "$DESC" \
             --arg author "$AUTHOR" --arg repo "$REPO_URL" \
             --arg name "$NAME" \
             '.name = $name | .version = $ver | .citadel.bundleUrl = $url | .citadel.title = $title | .description = $desc | .author = $author | .repository.url = $repo' \
             "$PKG_PATH" > temp.json && mv temp.json "$PKG_PATH"

      - name: Update README.md
        run: |
          PLUGIN_ID="${{ github.event.client_payload.plugin_id }}"
          TITLE="${{ github.event.client_payload.title }}"
          DESC="${{ github.event.client_payload.description }}"

          README_PATH="directory/$PLUGIN_ID/README.md"

          # Replace title and description placeholders
          sed -i "1s/.*/# $TITLE/" "$README_PATH"
          sed -i "3s/.*/$DESC/" "$README_PATH"

      - name: Update versions.json
        run: |
          PLUGIN_ID="${{ github.event.client_payload.plugin_id }}"
          VERSION="${{ github.event.client_payload.version }}"
          BUNDLE_URL="${{ github.event.client_payload.bundle_url }}"
          CHANGELOG="${{ github.event.client_payload.changelog }}"

          VERSIONS_PATH="directory/$PLUGIN_ID/versions.json"

          # Initialize versions.json if it doesn't exist
          if [ ! -f "$VERSIONS_PATH" ]; then
            echo '{"latest": "", "versions": {}}' > "$VERSIONS_PATH"
          fi

          # Add new version entry and update latest
          RELEASED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq --arg ver "$VERSION" --arg url "$BUNDLE_URL" --arg ch "$CHANGELOG" --arg dt "$RELEASED_AT" \
             '.versions[$ver] = { bundleUrl: $url, releasedAt: $dt, changelog: $ch, citadelVersionRange: ">=1.0.0" } | .latest = $ver' \
             "$VERSIONS_PATH" > temp.json && mv temp.json "$VERSIONS_PATH"

      - name: Update Root README.md
        run: |
          PLUGIN_ID="${{ github.event.client_payload.plugin_id }}"
          TITLE="${{ github.event.client_payload.title }}"
          AUTHOR="${{ github.event.client_payload.author }}"
          DESC="${{ github.event.client_payload.description }}"
          VERSION="${{ github.event.client_payload.version }}"

          README_PATH="README.md"

          # Check if plugin already exists in the table
          if grep -F -q "`$PLUGIN_ID`" "$README_PATH"; then
            # Update existing row (escaping / in PLUGIN_ID for sed address)
            ESCAPED_ID=$(echo "$PLUGIN_ID" | sed 's/\//\\\//g')
            sed -i "/\`$ESCAPED_ID\`/c\| **[$TITLE](./directory/$PLUGIN_ID)** | \`$PLUGIN_ID\` | $AUTHOR | $DESC | \`$VERSION\` |" "$README_PATH"
          else
            # Append new row to the table
            echo "| **[$TITLE](./directory/$PLUGIN_ID)** | \`$PLUGIN_ID\` | $AUTHOR | $DESC | \`$VERSION\` |" >> "$README_PATH"
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CITADEL_RELEASE_TOKEN}}
          commit-message: "Release: ${{ github.event.client_payload.plugin_id }}@${{ github.event.client_payload.version }}"
          branch: "update-${{ github.event.client_payload.plugin_id }}-${{ github.event.client_payload.version }}"
          title: "🚀 [Release] ${{ github.event.client_payload.plugin_id }} v${{ github.event.client_payload.version }}"
          body: |
            This is an automated PR from the plugin CI.

            - **Plugin**: `${{ github.event.client_payload.plugin_id }}`
            - **New Version**: `${{ github.event.client_payload.version }}`
            - **Bundle URL**: ${{ github.event.client_payload.bundle_url }}

            Please review the metadata changes and metadata syntax before merging.
          delete-branch: true
